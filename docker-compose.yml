# Optional: spins up Postgres + Redis for local dev.
# The app also works with locally-installed Postgres/Redis (see README).
#   docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: spur-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spur_chat
    ports:
      - "5432:5432"
    volumes:
      - spur_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spur-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spur_pgdata:
